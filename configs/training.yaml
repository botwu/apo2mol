data:
  topk_prompt: 0
  name: pl
  path: ./apo2mol_dataset/data_folder
  split: ./apo2mol_dataset/apo2mol_version/split_druglike.pt
  index: ./apo2mol_dataset/apo2mol_version/selected_index_apo_druglike.pkl
  type: both # [apo, holo, both]

  transform:
    ligand_atom_mode: add_aromatic
    random_rot: False

net_cond:
  ckpt_path: ./pretrained_models/PMINet
  hidden_dim: 128

model:
  cond_dim: 128
  topk_prompt: 0
  model_mean_type: C0  # ['noise', 'C0']
  beta_schedule: sigmoid
  beta_start: 1.e-7
  beta_end: 2.e-3
  v_beta_schedule: cosine
  v_beta_s: 0.01
  lambda_schedule: sigmoid
  num_diffusion_timesteps: 1000
  loss_v_weight: 100.
  sample_time_method: symmetric  # ['importance', 'symmetric']

  time_emb_dim: 0
  time_emb_mode: simple
  center_pos_mode: protein
  protein_update_schedule: static5 # [static5, none, uniform10, late_dense, residual_adaptive]
  protein_update_interval: 50
  protein_update_min_t: 10
  protein_update_residual_threshold: 0.5
  pocket_router_mode: none # [none, distance, random, motion_oracle, contact_oracle, contact_change_oracle, predicted_motion, cross_attn_gate]
  pocket_router_topk: 0
  pocket_router_shell_radius: 0.0
  pocket_router_shell_weight: 0.0
  pocket_router_background_weight: 0.0
  cross_attn_gate:
    inner_dim: 64
    gate_loss_weight: 1.0       # weight of the induced-fit supervision loss
    gate_target_center_A: 0.75  # effective-displacement (A) where the soft target crosses 0.5
    gate_target_sharpness: 4.0  # sharpness of the displacement->target sigmoid (rigid residue -> ~0.05)
    gate_rot_radius_A: 3.0      # convert residue frame rotation angle (rad) to effective displacement (A)
    gate_chi_radius_A: 1.5      # convert side-chain torsion change (rad) to effective displacement (A)
    stage2_two_forward: false   # stage-2: second forward on gate-corrected pocket so ligand loss trains the gate
    stage2_ligand_weight: 1.0   # weight of the stage-2 ligand-feedback loss
    stage2_lowt_gamma: 2.0      # low-t emphasis exponent for ligand feedback ((T-t)/T)^gamma

  node_indicator: True
  model_type: uni_o2
  num_blocks: 1
  num_layers: 9
  hidden_dim: 128
  n_heads: 16
  edge_feat_dim: 5  # edge type feat
  num_r_gaussian: 20
  knn: 32 # !
  num_node_types: 8
  act_fn: relu
  norm: True
  cutoff_mode: knn  # [radius, none]
  ew_net_type: global  # [r, m, none]
  num_x2h: 1
  num_h2x: 1
  r_max: 10.
  x2h_out_fc: False
  sync_twoup: False

train:
  seed: 2021
  batch_size: 2 # Recommend accumulating batches for up to 8 (batch_size * n_acc_batch * devices)
  val_batch_size: 2
  num_workers: 4
  val_num_workers: 2
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  n_acc_batch: 1
  max_iters: 1000000
  max_steps: -1
  val_freq: 5
  log_every_n_steps: 50
  train_report_iter: 200
  patience: 20
  pos_noise_std: 0.1
  max_grad_norm: 8.0
  bond_loss_weight: 1.0
  freeze_backbone: false
  freeze_residue_head: true
  pretrained_ckpt: null
  optimizer:
    type: adam
    lr: 5.e-4
    weight_decay: 0
    beta1: 0.95
    beta2: 0.999
  scheduler:
    type: plateau
    factor: 0.75
    patience: 10
    min_lr: 1.e-6
  limit_train_batches: 1.0
  limit_val_batches: 1.0

sys:
  accelerator: gpu
  strategy: ddp
  find_unused_parameters: True
  gradient_as_bucket_view: true
  devices: 4
  num_nodes: 1
  precision: bf16-mixed
  sync_batchnorm: false
  benchmark: true
